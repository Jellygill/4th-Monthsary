kind = "web"
previewPath = "/"
title = "The Heart That Keeps Beating"
version = "1.0.0"
id = "artifacts/heart-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24016

[services.development]
run = "pnpm --filter @workspace/heart-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/heart-website", "run", "build" ]
publicDir = "artifacts/heart-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24016"
BASE_PATH = "/"
